<script>
const SUPABASE_URL = 'https://nnbevkohcjnzyxgkzgna.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5uYmV2a29oY2puenl4Z2t6Z25hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE5OTU5NTksImV4cCI6MjA1NzU3MTk1OX0.azv5XuUBxoyvr19-eGxnl37X7u0GOlCRj3L0jZ_8JHY';

// Use non-conflicting name to avoid redeclaration error
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let chart;
let selectedSessionId = null;

const typeMap = { 'CASH': 'Cash', 'CC': 'Credit Card', 'TICKET': 'Ticket', 'COMP': 'Comp' };
function getType(key) { return typeMap[key?.split(' ')[0]] || key; }

function colorCodeItems(items) {
if (!items) return '';
return items.split('; ').map(item => {
const [key, rest] = item.split(': ');
const type = getType(key);
const color = type === 'Cash' ? '#00ff88' : type === 'Credit Card' ? '#ff3333' : type === 'Comp' ? '#ffaa00' : '#3399ff';
return `<span style="color:${color};font-weight:bold">${key}</span>: ${rest}`;
}).join('; ');
}

class SalesLog {
constructor() {
this.currentRange = 'all';
this.txns = [];
this.sessionData = {};
this.itemSummary = {};
this.cashBreakdown = {};
this.totalDoor = 0;
this.totalCash = 0;
this.totalTransactions = 0;
this.till = null;
this.initEvents();
this.loadSessions();
}

initEvents() {
document.getElementById('exportBtn').addEventListener('click', () => this.exportPDF());
document.getElementById('exportHtmlBtn').addEventListener('click', () => this.exportHTML());
document.getElementById('removeSessionBtn').addEventListener('click', () => this.confirmDelete());
document.getElementById('logoutBtn').addEventListener('click', () => {
  try {
    localStorage.removeItem('loggedIn');
  } catch(e) {
    console.error('Could not remove localStorage:', e);
  }
  location.reload();
});
document.getElementById('sessionSelect').addEventListener('change', (e) => {
selectedSessionId = e.target.value || null;
this.updateLog();
});
document.querySelectorAll('.timeframe-btn').forEach(btn => {
btn.addEventListener('click', (e) => {
document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
e.target.classList.add('active');
this.currentRange = e.target.dataset.range;
this.updateLog();
});
});
document.getElementById('transactionLogBody').addEventListener('click', (e) => {
const row = e.target.closest('tr');
if (!row || !row.dataset.ts) return;
document.querySelectorAll('#transactionLogBody tr').forEach(r => r.classList.remove('active'));
row.classList.add('active');
const time = new Date(parseInt(row.dataset.ts));
if (chart?.options?.plugins?.annotation) {
chart.options.plugins.annotation.annotations.line.value = time;
chart.update('none');
}
});
}

async confirmDelete() {
if (!selectedSessionId) return;
const confirmText = prompt(`Type "DELETE" to confirm deletion of session ${selectedSessionId}.\nThis action is PERMANENT.`);
if (confirmText !== 'DELETE') return;
try {
const { error } = await sb.from('transactions').delete().eq('sessionId', selectedSessionId);
if (error) throw error;
alert('Session permanently deleted');
location.reload();
} catch (e) {
alert('Delete failed: ' + e.message);
}
}

async loadSessions() {
try {
const { data, error } = await sb
.from('transactions')
.select('sessionId, cashierName, eventName, eventDate')
.order('timestamp', { ascending: false });

if (error) throw error;
if (!data?.length) {
console.error('No sessions found');
return;
}

const sessions = [...new Set(data.map(t => t.sessionId))].sort((a,b) => b.localeCompare(a));
const select = document.getElementById('sessionSelect');
select.innerHTML = '<option value="">Select Session</option>';

sessions.forEach(id => {
const tx = data.find(t => t.sessionId === id);
const opt = document.createElement('option');
opt.value = id;
opt.textContent = `${tx?.cashierName || 'Unknown'} • ${tx?.eventName || 'No Event'} • ${tx?.eventDate || 'No Date'}`;
select.appendChild(opt);
});

if (sessions.length && !selectedSessionId) {
selectedSessionId = sessions[0];
select.value = selectedSessionId;
}
this.updateLog();
} catch (e) {
console.error('Error loading sessions:', e);
alert('Failed to load sessions. Check console for details.');
}
}

filterTransactions(txns) {
if (this.currentRange === 'all') return txns;
const end = new Date(Math.max(...txns.map(t => new Date(t.timestamp))));
const mins = { '1h': 60, '30m': 30, '15m': 15, '5m': 5 }[this.currentRange] || 1440;
const start = new Date(end.getTime() - mins * 60 * 1000);
return txns.filter(t => new Date(t.timestamp) >= start);
}

buildChartData(txns) {
txns.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
const interval = 15 * 60 * 1000;
const start = new Date(Math.floor(new Date(txns[0]?.timestamp || Date.now()).getTime() / interval) * interval);
const end = new Date(Math.ceil(new Date(txns[txns.length-1]?.timestamp || Date.now()).getTime() / interval) * interval);
const bins = [];
for (let t = start.getTime(); t <= end.getTime(); t += interval) bins.push(new Date(t));

const cum = { Cash: 0, 'Credit Card': 0, Comp: 0, Ticket: 0, door: 0, cash: 0 };
const data = [];

let txIdx = 0;
bins.forEach(bin => {
while (txIdx < txns.length && new Date(txns[txIdx].timestamp) <= bin) {
const t = txns[txIdx];
if (t.items !== 'Till Count') {
t.items.split('; ').forEach(item => {
const [key, val] = item.split(': ');
if (!key || !val) return;
const type = getType(key);
const count = parseInt(val.trim(), 10) || 0;
if (['Cash','Credit Card','Comp','Ticket'].includes(type)) {
cum[type] += count;
cum.door += count;
}
});
cum.cash += t.cashTotal || 0;
}
txIdx++;
}
data.push({ x: bin, ...cum });
});

return [
{ label: 'CASH', data: data.map(d => ({x: d.x, y: d.Cash})), borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.25)', fill: true, tension: 0.4 },
{ label: 'CARD', data: data.map(d => ({x: d.x, y: d['Credit Card']})), borderColor: '#ff3333', backgroundColor: 'rgba(255,51,51,0.25)', fill: true, tension: 0.4 },
{ label: 'COMP', data: data.map(d => ({x: d.x, y: d.Comp})), borderColor: '#ffaa00', backgroundColor: 'rgba(255,170,0,0.25)', fill: true, tension: 0.4 },
{ label: 'TICKET', data: data.map(d => ({x: d.x, y: d.Ticket})), borderColor: '#3399ff', backgroundColor: 'rgba(51,153,255,0.25)', fill: true, tension: 0.4 },
{ label: 'TOTAL DOOR', data: data.map(d => ({x: d.x, y: d.door})), borderColor: '#ffffff', borderWidth: 5, fill: false, tension: 0.4 },
{ label: 'CASH SALES $', data: data.map(d => ({x: d.x, y: d.cash})), borderColor: '#00ff88', borderWidth: 4, fill: false, yAxisID: 'y1', tension: 0.4 }
];
}

async updateLog() {
if (!selectedSessionId) return;

try {
const { data: txns, error } = await sb
.from('transactions')
.select('*')
.eq('sessionId', selectedSessionId)
.order('timestamp', { ascending: true });

if (error) throw error;
if (!txns?.length) {
document.getElementById('sessionInfo').innerHTML = '<p style="color:#ff3333;">No data found for this session</p>';
return;
}

this.txns = txns;
const first = txns[0];
this.sessionData = {
cashierName: first.cashierName || 'Unknown',
eventName: first.eventName || 'No Event',
eventDate: first.eventDate || 'No Date'
};

document.getElementById('sessionInfo').innerHTML = `<strong>${this.sessionData.cashierName}</strong><br>${this.sessionData.eventName}`;
document.getElementById('eventDateDisplay').textContent = this.sessionData.eventDate;

this.totalDoor = 0;
this.totalCash = 0;
this.itemSummary = { Cash: {people:0,total:0}, 'Credit Card': {people:0,total:0}, Comp: {people:0,total:0}, Ticket: {people:0,total:0} };
this.cashBreakdown = {};

txns.forEach(t => {
if (t.items === 'Till Count') return;
this.totalDoor += t.doorCount || 0;
this.totalCash += t.cashTotal || 0;
t.items.split('; ').forEach(item => {
const [key, val] = item.split(': ');
if (!key || !val) return;
const type = getType(key);
const count = parseInt(val.trim(), 10) || 0;
if (this.itemSummary[type]) {
this.itemSummary[type].people += count;
if (type === 'Cash') {
const price = parseFloat(key.match(/\$([\d.]+)/)?.[1] || 0);
const subKey = key.replace(/^CASH\s*/, '');
this.cashBreakdown[subKey] = this.cashBreakdown[subKey] || {people:0,total:0};
this.cashBreakdown[subKey].people += count;
this.cashBreakdown[subKey].total += count * price;
this.itemSummary[type].total += count * price;
}
}
});
});

this.totalTransactions = txns.filter(t => t.items !== 'Till Count').length;
document.getElementById('totalDoorCount').textContent = this.totalDoor;
document.getElementById('totalSales').textContent = this.totalCash.toFixed(2);
document.getElementById('totalTransactions').textContent = this.totalTransactions;

this.till = txns.find(t => t.items === 'Till Count');
if (this.till) {
document.getElementById('tillTotal').textContent = this.till.cashTotal.toFixed(2);
document.getElementById('tillBreakdown').innerHTML = `<p style="color:#ffaa00;">${this.till.note}</p>`;
} else {
document.getElementById('tillTotal').textContent = '0.00';
document.getElementById('tillBreakdown').innerHTML = '';
}

let rows = '';
Object.entries(this.itemSummary).forEach(([type, d]) => {
if (d.people > 0) {
const avg = d.total / d.people || 0;
const color = type === 'Cash' ? '#00ff88' : type === 'Credit Card' ? '#ff3333' : type === 'Comp' ? '#ffaa00' : '#3399ff';
rows += `<tr><td style="color:${color};font-weight:bold">${type.toUpperCase()}</td><td>${d.people}</td><td>$${d.total.toFixed(2)}</td><td>$${avg.toFixed(2)}</td></tr>`;
if (type === 'Cash') {
Object.keys(this.cashBreakdown).sort((a,b) => {
const pa = parseFloat(a.match(/\$([\d.]+)/)?.[1]||0);
const pb = parseFloat(b.match(/\$([\d.]+)/)?.[1]||0);
return pa - pb;
}).forEach(k => {
const bd = this.cashBreakdown[k];
const avg = bd.total / bd.people || 0;
rows += `<tr class="cash-breakdown"><td> ${k}</td><td>${bd.people}</td><td>$${bd.total.toFixed(2)}</td><td>$${avg.toFixed(2)}</td></tr>`;
});
}
}
});
document.getElementById('summaryBody').innerHTML = rows;
document.getElementById('totalsBody').innerHTML = `<tr class="total-row"><td>TOTAL</td><td>${this.totalDoor}</td><td>$${this.totalCash.toFixed(2)}</td><td>${this.totalDoor ? (this.totalCash/this.totalDoor).toFixed(2) : '0'}</td></tr>`;

document.getElementById('transactionLogBody').innerHTML = txns
.filter(t => t.items !== 'Till Count')
.map(t => `<tr data-ts="${new Date(t.timestamp).getTime()}">
<td>${new Date(t.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</td>
<td>${colorCodeItems(t.items)}</td>
<td style="color:#00ff88">$${t.cashTotal?.toFixed(2)||'0.00'}</td>
<td>${t.doorCount||0}</td>
<td>${t.cashierName||''}</td>
<td>${t.note||''}</td>
</tr>`).join('');

const filtered = this.filterTransactions([...txns]);
const graphData = this.buildChartData(filtered);
const datasets = graphData;
if (chart) {
chart.data.datasets = datasets;
chart.update('none');
} else {
chart = new Chart(document.getElementById('doorCountChart'), {
type: 'line',
data: { datasets },
options: {
maintainAspectRatio: false,
interaction: { mode: 'nearest', axis: 'x', intersect: false },
plugins: {
legend: {
position: 'top',
labels: {
font: { size: 18, weight: 'bold' },
color: 'white',
padding: 25,
usePointStyle: true,
pointStyle: 'rectRounded'
}
},
tooltip: {
backgroundColor: 'rgba(0,0,0,0.9)',
titleColor: '#00ff88',
bodyColor: 'white',
padding: 20,
titleFont: { size: 18, weight: 'bold' },
bodyFont: { size: 16 }
},
annotation: {
annotations: {
line: {
type: 'line',
scaleID: 'x',
borderColor: '#ffaa00',
borderWidth: 4,
label: {
display: true,
content: 'SELECTED',
backgroundColor: '#ffaa00',
color: 'black',
font: { weight: 'bold', size: 16 }
}
}
}
},
zoom: {
zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' },
pan: { enabled: true, mode: 'x' }
}
},
scales: {
x: {
type: 'time',
time: { unit: 'minute', displayFormats: { minute: 'HH:mm' } },
ticks: {
font: { size: 16, weight: 'bold' },
color: '#cccccc',
maxRotation: 0
},
grid: { color: 'rgba(255,255,255,0.05)' }
},
y: {
title: {
display: true,
text: 'PEOPLE THROUGH DOOR',
font: { size: 20, weight: 'bold' },
color: '#00ff88'
},
ticks: { font: { size: 16 }, color: '#cccccc' },
grid: { color: 'rgba(255,255,255,0.1)' }
},
y1: {
position: 'right',
title: {
display: true,
text: 'CASH SALES ($)',
font: { size: 20, weight: 'bold' },
color: '#00ff88'
},
ticks: { font: { size: 16 }, color: '#cccccc' },
grid: { drawOnChartArea: false }
}
}
},
plugins: [{
id: 'stripes30min',
beforeDraw: function(chart) {
const ctx = chart.ctx;
const chartArea = chart.chartArea;
const xAxis = chart.scales.x;
if (!xAxis) return;

const interval = 30 * 60 * 1000; // 30 minutes
const start = xAxis.min || xAxis.getValueForPixel(chartArea.left);
const end = xAxis.max || xAxis.getValueForPixel(chartArea.right);
let current = new Date(Math.floor(start / interval) * interval);

ctx.save();
let i = 0;
while (current < end) {
const x = xAxis.getPixelForValue(current);
const next = new Date(current.getTime() + interval);
const nextX = xAxis.getPixelForValue(next);

if (i % 2 === 1) {
ctx.fillStyle = 'rgba(255,255,255,0.03)';
ctx.fillRect(x, chartArea.top, nextX - x, chartArea.bottom - chartArea.top);
}
current = next;
i++;
}
ctx.restore();
}
}]
});
}
} catch (e) {
console.error('Error updating log:', e);
alert('Failed to update log. Check console for details.');
}
}

exportPDF() {
if (!this.txns.length || !selectedSessionId) return alert('No data to export');

const { jsPDF } = window.jspdf;
const doc = new jsPDF('l', 'mm', 'a4');

doc.setFontSize(24);
doc.setTextColor(0, 255, 136);
doc.text('SISTER BAR SALES LOG', 148.5, 20, { align: 'center' });
doc.setTextColor(0, 0, 0);
doc.setFontSize(14);
doc.text(`Session ID: ${selectedSessionId}`, 10, 35);
doc.text(`Event: ${this.sessionData.eventName}`, 10, 45);
doc.text(`Date: ${this.sessionData.eventDate}`, 10, 55);
doc.text(`Cashier: ${this.sessionData.cashierName}`, 10, 65);
doc.text(`Generated: ${new Date().toLocaleString()}`, 10, 75);

doc.setTextColor(0, 255, 136);
doc.setFontSize(18);
doc.text(`Total Door: ${this.totalDoor}`, 200, 35);
doc.text(`Cash Sales: $${this.totalCash.toFixed(2)}`, 200, 45);
doc.text(`Transactions: ${this.totalTransactions}`, 200, 55);
if (this.till) {
doc.setTextColor(255, 51, 51);
doc.text(`Till Count: $${this.till.cashTotal.toFixed(2)}`, 200, 65);
}

const chartCanvas = document.getElementById('doorCountChart');
const chartImg = chartCanvas.toDataURL('image/png');
doc.addImage(chartImg, 'PNG', 10, 85, 277, 100);

const summaryBody = [];
Object.entries(this.itemSummary).forEach(([type, d]) => {
if (d.people > 0) {
const avg = d.total / d.people || 0;
summaryBody.push([type.toUpperCase(), d.people.toString(), `$${d.total.toFixed(2)}`, `$${avg.toFixed(2)}`]);
if (type === 'Cash') {
Object.keys(this.cashBreakdown).sort((a, b) => {
const pa = parseFloat(a.match(/\$([\d.]+)/)?.[1] || 0);
const pb = parseFloat(b.match(/\$([\d.]+)/)?.[1] || 0);
return pa - pb;
}).forEach(k => {
const bd = this.cashBreakdown[k];
const avg = bd.total / bd.people || 0;
summaryBody.push([`  ${k}`, bd.people.toString(), `$${bd.total.toFixed(2)}`, `$${avg.toFixed(2)}`]);
});
}
}
});

doc.autoTable({
head: [['Type', 'People', 'Amount', 'Per Person']],
body: summaryBody,
startY: 190,
theme: 'grid',
headStyles: { fillColor: [0, 255, 136], textColor: [0, 0, 0], fontStyle: 'bold' },
bodyStyles: { fillColor: [240, 240, 240], textColor: [0, 0, 0] },
alternateRowStyles: { fillColor: [220, 220, 220] },
margin: { left: 10, right: 10 }
});

doc.addPage();
const logBody = this.txns
.filter(t => t.items !== 'Till Count')
.map(t => [
new Date(t.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
t.items,
`$${t.cashTotal?.toFixed(2) || '0.00'}`,
t.doorCount || 0,
t.cashierName || '',
t.note || ''
]);

doc.autoTable({
head: [['Time', 'Items', 'Cash', 'Door', 'Cashier', 'Note']],
body: logBody,
startY: 20,
theme: 'grid',
headStyles: { fillColor: [0, 255, 136], textColor: [0, 0, 0], fontStyle: 'bold' },
bodyStyles: { fillColor: [240, 240, 240], textColor: [0, 0, 0] },
alternateRowStyles: { fillColor: [220, 220, 220] },
margin: { left: 10, right: 10 },
didParseCell: (data) => {
if (data.section === 'body' && data.column.index === 1) {
data.cell.raw = data.cell.raw.replace(/;/g, ';\n'); // for better wrapping if needed
}
}
});

doc.save(`SISTERBAR_SalesLog_${selectedSessionId}.pdf`);
}
